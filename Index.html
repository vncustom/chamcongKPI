<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nhật ký chấm công KPI</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #647184;
      --line: #dfe5ee;
      --primary: #0f766e;
      --primary-dark: #115e59;
      --focus: #f59e0b;
      --danger: #b42318;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 15px;
      line-height: 1.45;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .app {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 34px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .status {
      min-height: 38px;
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--muted);
      white-space: nowrap;
    }

    .status.error {
      color: var(--danger);
      border-color: #f3b4ad;
      background: #fff7f5;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(220px, 280px) 1fr auto auto;
      gap: 10px;
      align-items: end;
      margin-bottom: 16px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      outline: none;
    }

    input {
      height: 40px;
      padding: 8px 10px;
    }

    textarea {
      min-height: 40px;
      resize: vertical;
      padding: 10px;
    }

    input:focus,
    textarea:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.18);
    }

    .button {
      height: 40px;
      border: 0;
      border-radius: 6px;
      padding: 0 15px;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    .button:hover {
      background: var(--primary-dark);
    }

    .button.secondary {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
    }

    .button.secondary:hover {
      border-color: #b8c2d1;
      background: #f9fafb;
    }

    .button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 16px;
      align-items: start;
    }

    .section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }

    .section h2 {
      margin: 0 0 14px;
      font-size: 17px;
      letter-spacing: 0;
    }

    .section h2.inline-heading {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .program-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .qty-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      min-height: 58px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcfd;
    }

    .qty-row span {
      min-width: 0;
      overflow-wrap: anywhere;
      font-weight: 600;
    }

    .stepper {
      display: grid;
      grid-template-columns: 44px 54px 44px;
      gap: 4px;
      align-items: center;
    }

    .stepper button {
      width: 44px;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
      font-size: 24px;
      font-weight: 700;
      line-height: 1;
    }

    .stepper button:active {
      background: #e8f3f1;
      border-color: var(--primary);
    }

    .qty-row input {
      height: 44px;
      text-align: center;
      padding: 4px;
      background: #fff;
      font-size: 18px;
      font-weight: 700;
      -moz-appearance: textfield;
    }

    .qty-row input::-webkit-outer-spin-button,
    .qty-row input::-webkit-inner-spin-button {
      margin: 0;
      -webkit-appearance: none;
    }

    .side {
      display: grid;
      gap: 16px;
    }

    .live-grid {
      display: grid;
      gap: 10px;
    }

    .report-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .report-grid .button {
      grid-column: 1 / -1;
    }

    .footer-actions {
      position: sticky;
      bottom: 0;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 16px;
      padding: 12px 0 0;
      background: linear-gradient(180deg, rgba(246, 247, 249, 0), var(--bg) 28%);
    }

    @media (max-width: 1120px) {
      .controls,
      .layout {
        grid-template-columns: 1fr;
      }

      .program-grid {
        grid-template-columns: 1fr !important;
      }

      .status {
        white-space: normal;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }
    }

    @media (max-width: 1024px) {
      body {
        font-size: 16px;
      }

      .app {
        width: 100%;
        padding: 12px 10px 92px;
      }

      h1 {
        font-size: 22px;
      }

      .section {
        padding: 12px;
        border-radius: 0;
      }

      .controls {
        gap: 8px;
      }

      .controls .button {
        width: 100%;
      }

      .qty-row {
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 10px;
      }

      .qty-row span {
        font-size: 16px;
      }

      .stepper {
        grid-template-columns: 56px minmax(82px, 1fr) 56px;
      }

      .stepper button,
      .qty-row input {
        height: 52px;
      }

      .stepper button {
        width: 56px;
        font-size: 28px;
      }

      .footer-actions {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 10px;
        background: var(--panel);
        border-top: 1px solid var(--line);
      }

      .footer-actions .button {
        flex: 1;
        height: 46px;
      }
    }

    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.25s ease, visibility 0.25s ease;
    }

    .modal-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: var(--panel);
      width: min(720px, calc(100% - 24px));
      max-height: 85vh;
      border-radius: 12px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      display: flex;
      flex-direction: column;
      transform: translateY(20px) scale(0.95);
      transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      border: 1px solid var(--line);
    }

    .modal-overlay.open .modal-content {
      transform: translateY(0) scale(1);
    }

    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .modal-close {
      background: none;
      border: 0;
      font-size: 24px;
      color: var(--muted);
      cursor: pointer;
      line-height: 1;
      padding: 4px 8px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover {
      background: var(--bg);
      color: var(--text);
    }

    .modal-body {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }

    /* Stats Dashboard widgets */
    .stats-dashboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: #f8fafc;
      border: 1px solid var(--line);
      padding: 12px 16px;
      border-radius: 8px;
      text-align: center;
    }

    .stat-card-title {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .stat-card-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--primary);
    }

    .stat-card-value.highlight {
      color: #b45309; /* warm color for days */
    }

    .stat-card-value.info {
      color: #0369a1; /* blue for programs */
    }

    .stat-detail-section {
      margin-top: 10px;
    }

    .stat-detail-section h4 {
      margin: 0 0 10px;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      border-bottom: 2px solid var(--primary);
      padding-bottom: 4px;
      display: inline-block;
    }

    /* Day list style */
    .days-list {
      display: grid;
      gap: 10px;
    }

    .day-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .day-item-header {
      background: #f8fafc;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .day-date {
      font-weight: 700;
      color: var(--text);
      font-size: 14px;
    }

    .day-date-weekday {
      font-weight: normal;
      color: var(--muted);
      font-size: 13px;
      margin-left: 4px;
    }

    .day-badges {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 12px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 9999px;
      line-height: 1.2;
    }

    .badge-live-role {
      background: #e6f4ea;
      color: #137333;
      border: 1px solid #ceead6;
    }
    
    .badge-live-role.truong-ca {
      background: #feefe3;
      color: #b06000;
      border: 1px solid #fad2cf;
    }

    .badge-cong {
      background: #e8f0fe;
      color: #1a73e8;
      border: 1px solid #d2e3fc;
    }

    .day-item-body {
      padding: 10px 14px;
      font-size: 14px;
    }

    .day-programs {
      margin: 0;
      padding: 0 0 0 18px;
      color: var(--text);
    }

    .day-programs li {
      margin-bottom: 4px;
    }

    .day-programs li:last-child {
      margin-bottom: 0;
    }

    .day-note {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
      font-style: italic;
      font-size: 13px;
    }

    .empty-state {
      padding: 30px;
      text-align: center;
      color: var(--muted);
      font-style: italic;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: #fbfcfd;
    }

    @media (max-width: 600px) {
      .stats-dashboard {
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .modal-content {
        max-height: 90vh;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <h1>Nhật ký chấm công KPI</h1>
      <div id="status" class="status">Đang tải...</div>
    </div>

    <section class="controls">
      <div class="field">
        <label for="workDate">Ngày</label>
        <input id="workDate" type="date">
      </div>
      <div class="field">
        <label for="note">Ghi chú</label>
        <textarea id="note" rows="1"></textarea>
      </div>
      <button id="loadButton" class="button secondary" type="button">Tải ngày</button>
      <button id="saveButton" class="button" type="button">Lưu nhật ký</button>
    </section>

    <div class="layout">
      <section class="section">
        <h2>Chương trình</h2>
        <div id="programGrid" class="program-grid"></div>
        <h2 class="inline-heading">Truyền hình trực tiếp</h2>
        <div id="liveGrid" class="live-grid"></div>
      </section>

      <aside class="side">
        <section class="section">
          <h2>Thống kê tháng</h2>
          <div class="report-grid">
            <div class="field">
              <label for="reportMonth">Tháng</label>
              <input id="reportMonth" type="number" min="1" max="12">
            </div>
            <div class="field">
              <label for="reportYear">Năm</label>
              <input id="reportYear" type="number" min="2020" max="2100">
            </div>
            <button id="statsButton" class="button secondary" type="button" style="grid-column: 1 / -1; margin-bottom: 4px;">Xem thống kê</button>
            <button id="reportButton" class="button" type="button" style="grid-column: 1 / -1;">Tạo sheet báo cáo</button>
          </div>
        </section>
      </aside>
    </div>

    <div class="footer-actions">
      <button id="clearButton" class="button secondary" type="button">Xóa số nhập</button>
      <button id="saveButtonBottom" class="button" type="button">Lưu nhật ký</button>
    </div>
  </main>

  <!-- Modal Xem thống kê -->
  <div id="statsModal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Thống kê tháng</h3>
        <button id="closeModal" class="modal-close" type="button" aria-label="Đóng modal">&times;</button>
      </div>
      <div class="modal-body" id="modalBody">
        <!-- Dashboard summary -->
        <div class="stats-dashboard">
          <div class="stat-card">
            <div class="stat-card-title">Tổng công tích lũy</div>
            <div class="stat-card-value" id="statTotalCong">0.0</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-title">Số chương trình</div>
            <div class="stat-card-value info" id="statTotalPrograms">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-title">Số ngày làm/trực</div>
            <div class="stat-card-value highlight" id="statTotalDays">0</div>
          </div>
        </div>
        
        <!-- Detailed list -->
        <div class="stat-detail-section">
          <h4>Chi tiết các ngày làm việc</h4>
          <div id="statsDaysList" class="days-list">
            <!-- Rendered dynamically -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const state = {
      programs: [],
      liveRoles: [],
      busy: false,
    };

    const els = {
      status: document.getElementById('status'),
      workDate: document.getElementById('workDate'),
      note: document.getElementById('note'),
      programGrid: document.getElementById('programGrid'),
      liveGrid: document.getElementById('liveGrid'),
      loadButton: document.getElementById('loadButton'),
      saveButton: document.getElementById('saveButton'),
      saveButtonBottom: document.getElementById('saveButtonBottom'),
      clearButton: document.getElementById('clearButton'),
      reportButton: document.getElementById('reportButton'),
      reportMonth: document.getElementById('reportMonth'),
      reportYear: document.getElementById('reportYear'),
      statsButton: document.getElementById('statsButton'),
      statsModal: document.getElementById('statsModal'),
      closeModal: document.getElementById('closeModal'),
      modalTitle: document.getElementById('modalTitle'),
      statTotalCong: document.getElementById('statTotalCong'),
      statTotalPrograms: document.getElementById('statTotalPrograms'),
      statTotalDays: document.getElementById('statTotalDays'),
      statsDaysList: document.getElementById('statsDaysList'),
    };

    function setStatus(message, isError) {
      els.status.textContent = message;
      els.status.classList.toggle('error', Boolean(isError));
    }

    function setBusy(value) {
      state.busy = value;
      [
        els.loadButton,
        els.saveButton,
        els.saveButtonBottom,
        els.clearButton,
        els.reportButton,
        els.statsButton,
      ].forEach((button) => {
        button.disabled = value;
      });
      document.querySelectorAll('.stepper button, input[data-group]').forEach((control) => {
        control.disabled = value;
      });
    }

    function createQuantityRow(name, group) {
      const row = document.createElement('div');
      row.className = 'qty-row';

      const text = document.createElement('span');
      text.textContent = name;

      const stepper = document.createElement('div');
      stepper.className = 'stepper';

      const minus = document.createElement('button');
      minus.type = 'button';
      minus.textContent = '−';
      minus.setAttribute('aria-label', 'Giảm ' + name);

      const input = document.createElement('input');
      input.type = 'number';
      input.min = '0';
      input.step = '1';
      input.inputMode = 'numeric';
      input.value = '0';
      input.dataset.group = group;
      input.dataset.name = name;

      const plus = document.createElement('button');
      plus.type = 'button';
      plus.textContent = '+';
      plus.setAttribute('aria-label', 'Tăng ' + name);

      minus.addEventListener('click', () => changeQuantity(input, -1));
      plus.addEventListener('click', () => changeQuantity(input, 1));
      input.addEventListener('change', () => normalizeInputValue(input));

      stepper.append(minus, input, plus);
      row.append(text, stepper);
      return row;
    }

    function normalizeInputValue(input) {
      const value = Math.max(0, Number.parseInt(input.value || '0', 10) || 0);
      input.value = value;
    }

    function changeQuantity(input, delta) {
      const current = Number.parseInt(input.value || '0', 10) || 0;
      input.value = Math.max(0, current + delta);
    }

    function renderLists() {
      els.programGrid.textContent = '';
      els.liveGrid.textContent = '';

      state.programs.forEach((name) => {
        els.programGrid.appendChild(createQuantityRow(name, 'programs'));
      });
      state.liveRoles.forEach((name) => {
        els.liveGrid.appendChild(createQuantityRow(name, 'live'));
      });
    }

    function collectEntry() {
      const entry = {
        date: els.workDate.value,
        programs: {},
        live: {},
        note: els.note.value,
      };

      document.querySelectorAll('input[data-group="programs"]').forEach((input) => {
        entry.programs[input.dataset.name] = Number(input.value || 0);
      });
      document.querySelectorAll('input[data-group="live"]').forEach((input) => {
        entry.live[input.dataset.name] = Number(input.value || 0);
      });

      return entry;
    }

    function fillEntry(entry) {
      els.workDate.value = entry.date;
      els.note.value = entry.note || '';

      document.querySelectorAll('input[data-group="programs"]').forEach((input) => {
        input.value = entry.programs && entry.programs[input.dataset.name] ? entry.programs[input.dataset.name] : 0;
      });
      document.querySelectorAll('input[data-group="live"]').forEach((input) => {
        input.value = entry.live && entry.live[input.dataset.name] ? entry.live[input.dataset.name] : 0;
      });
    }

    function clearNumbers() {
      document.querySelectorAll('input[data-group]').forEach((input) => {
        input.value = 0;
      });
      els.note.value = '';
      setStatus('Đã xóa số trên màn hình');
    }

    function loadEntry() {
      if (!els.workDate.value) {
        setStatus('Chọn ngày trước khi tải', true);
        return;
      }

      setBusy(true);
      setStatus('Đang tải nhật ký...');
      google.script.run
        .withSuccessHandler((entry) => {
          fillEntry(entry);
          setBusy(false);
          setStatus('Đã tải ngày ' + entry.date);
        })
        .withFailureHandler((error) => {
          setBusy(false);
          setStatus(error.message || String(error), true);
        })
        .getEntryForDate(els.workDate.value);
    }

    function saveEntry() {
      if (!els.workDate.value) {
        setStatus('Chọn ngày trước khi lưu', true);
        return;
      }

      setBusy(true);
      setStatus('Đang lưu nhật ký...');
      google.script.run
        .withSuccessHandler((result) => {
          setBusy(false);
          setStatus(result.message || 'Đã lưu');
        })
        .withFailureHandler((error) => {
          setBusy(false);
          setStatus(error.message || String(error), true);
        })
        .saveJournalEntry(collectEntry());
    }

    function createReport() {
      setBusy(true);
      setStatus('Đang tạo thống kê tháng...');
      google.script.run
        .withSuccessHandler((result) => {
          setBusy(false);
          setStatus('Đã tạo/cập nhật sheet ' + result.sheetName);
        })
        .withFailureHandler((error) => {
          setBusy(false);
          setStatus(error.message || String(error), true);
        })
        .createReportFromWeb(els.reportYear.value, els.reportMonth.value);
    }

    function closeStatsModal() {
      els.statsModal.classList.remove('open');
    }

    function getDayOfWeekName(dateStr) {
      const date = new Date(dateStr);
      const days = ['Chủ Nhật', 'Thứ Hai', 'Thứ Ba', 'Thứ Tư', 'Thứ Năm', 'Thứ Sáu', 'Thứ Bảy'];
      return isNaN(date.getTime()) ? '' : days[date.getDay()];
    }

    function formatDateDM(dateStr) {
      const parts = dateStr.split('-');
      if (parts.length === 3) {
        return parts[2] + '/' + parts[1];
      }
      return dateStr;
    }

    function showStatsModal() {
      const year = els.reportYear.value;
      const month = els.reportMonth.value;
      
      if (!month || !year) {
        setStatus('Vui lòng chọn tháng và năm trước', true);
        return;
      }

      setBusy(true);
      setStatus('Đang tải thống kê...');
      
      google.script.run
        .withSuccessHandler((res) => {
          setBusy(false);
          setStatus('Đã tải thống kê tháng ' + month + '/' + year);
          renderStatsModal(res);
        })
        .withFailureHandler((error) => {
          setBusy(false);
          setStatus(error.message || String(error), true);
        })
        .getMonthlyStats(year, month);
    }

    function renderStatsModal(data) {
      els.modalTitle.textContent = 'Thống kê tháng ' + data.month + '/' + data.year;
      
      els.statTotalCong.textContent = data.summary.totalCong.toFixed(2);
      els.statTotalPrograms.textContent = data.summary.totalProgramsDone;
      els.statTotalDays.textContent = data.summary.totalWorkingDays;
      
      els.statsDaysList.textContent = '';
      
      if (data.dailyEntries.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.textContent = 'Không có nhật ký công việc nào trong tháng này.';
        els.statsDaysList.appendChild(empty);
      } else {
        data.dailyEntries.forEach((entry) => {
          const item = document.createElement('div');
          item.className = 'day-item';
          
          const header = document.createElement('div');
          header.className = 'day-item-header';
          
          const dateDiv = document.createElement('div');
          dateDiv.className = 'day-date';
          dateDiv.textContent = formatDateDM(entry.date);
          
          const weekdaySpan = document.createElement('span');
          weekdaySpan.className = 'day-date-weekday';
          weekdaySpan.textContent = '(' + getDayOfWeekName(entry.date) + ')';
          dateDiv.appendChild(weekdaySpan);
          
          const badgesDiv = document.createElement('div');
          badgesDiv.className = 'day-badges';
          
          entry.live.forEach((role) => {
            const isTruongCa = role.name.toLowerCase().indexOf('trưởng ca') >= 0;
            const badge = document.createElement('span');
            badge.className = 'badge badge-live-role' + (isTruongCa ? ' truong-ca' : '');
            badge.textContent = 'Trực THTT: ' + role.name + (role.qty > 1 ? ' (x' + role.qty + ')' : '');
            badgesDiv.appendChild(badge);
          });
          
          const congBadge = document.createElement('span');
          congBadge.className = 'badge badge-cong';
          congBadge.textContent = entry.totalCong.toFixed(2) + ' công';
          badgesDiv.appendChild(congBadge);
          
          header.appendChild(dateDiv);
          header.appendChild(badgesDiv);
          item.appendChild(header);
          
          const body = document.createElement('div');
          body.className = 'day-item-body';
          
          if (entry.programs.length > 0) {
            const list = document.createElement('ul');
            list.className = 'day-programs';
            entry.programs.forEach((prog) => {
              const li = document.createElement('li');
              li.textContent = prog.name + ': ' + prog.qty + ' chương trình (' + (prog.qty * prog.coeff).toFixed(2) + ' công)';
              list.appendChild(li);
            });
            body.appendChild(list);
          } else if (entry.live.length > 0 && entry.programs.length === 0) {
            const noProgMsg = document.createElement('div');
            noProgMsg.style.color = 'var(--muted)';
            noProgMsg.style.fontSize = '13px';
            noProgMsg.textContent = 'Không có chương trình (chỉ trực THTT).';
            body.appendChild(noProgMsg);
          }
          
          if (entry.note) {
            const noteDiv = document.createElement('div');
            noteDiv.className = 'day-note';
            noteDiv.textContent = 'Ghi chú: ' + entry.note;
            body.appendChild(noteDiv);
          }
          
          item.appendChild(body);
          els.statsDaysList.appendChild(item);
        });
      }
      
      els.statsModal.classList.add('open');
    }

    function initialize() {
      setBusy(true);
      google.script.run
        .withSuccessHandler((data) => {
          const today = new Date();
          state.programs = data.programs;
          state.liveRoles = data.liveRoles;
          renderLists();
          els.workDate.value = data.today;
          els.reportMonth.value = today.getMonth() + 1;
          els.reportYear.value = today.getFullYear();
          setBusy(false);
          loadEntry();
        })
        .withFailureHandler((error) => {
          setBusy(false);
          setStatus(error.message || String(error), true);
        })
        .getInitialData();
    }

    els.loadButton.addEventListener('click', loadEntry);
    els.workDate.addEventListener('change', loadEntry);
    els.saveButton.addEventListener('click', saveEntry);
    els.saveButtonBottom.addEventListener('click', saveEntry);
    els.clearButton.addEventListener('click', clearNumbers);
    els.reportButton.addEventListener('click', createReport);
    els.statsButton.addEventListener('click', showStatsModal);
    els.closeModal.addEventListener('click', closeStatsModal);
    els.statsModal.addEventListener('click', (e) => {
      if (e.target === els.statsModal) closeStatsModal();
    });
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && els.statsModal.classList.contains('open')) {
        closeStatsModal();
      }
    });

    initialize();
  </script>
</body>
</html>
